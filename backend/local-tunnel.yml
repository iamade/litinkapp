# =============================================================================
# DEPRECATED compatibility override for tunnel mode.
# Preferred commands:
#   make tunnel-dev && make vps-dev
#   make tunnel-staging && make vps-staging
#
# The start-vps-* scripts now avoid local Postgres/Redis/MinIO by starting only:
#   api, celeryworker, celerybeat
# so this override is normally not needed.
# =============================================================================
services:
  api:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}

  celeryworker:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}

  celerybeat:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}
