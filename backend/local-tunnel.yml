# =============================================================================
# DEPRECATED compatibility override for tunnel mode.
# Preferred commands:
#   make tunnel-dev && make vps-dev
#   make tunnel-staging && make vps-staging
#
# The start scripts use `docker compose ... up --no-deps api celeryworker celerybeat`
# so local Postgres/Redis/MinIO are not launched in VPS tunnel mode.
# =============================================================================
services:
  api:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}

  celeryworker:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}

  celerybeat:
    env_file:
      - ${ENV_FILE:-./.envs/.env.local}
