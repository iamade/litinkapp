# =============================================================================
# VPS-Staging Compose — Mac dev → VPS staging API via Traefik
# Project name: vps-staging (container prefix: vps-staging-*)
# Network: vps_staging_nw (isolated from litinkai_local_nw)
# Volumes: vps_staging_* (isolated from litinkai_*)
#
# IMPORTANT: Ports 80/443 are currently occupied by Caddy on this VPS.
# Before starting, stop Caddy or reconfigure to free 80/443 for Traefik.
# =============================================================================

services:
  traefik:
    image: docker.io/traefik:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard (internal, restrict via firewall in production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/vps-staging/traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./docker/vps-staging/traefik/certs:/etc/traefik/certs
    networks:
      - vps_staging_nw
    command:
      - --providers.docker

  api: &api
    build:
      context: .
      dockerfile: ./docker/local/fastapi/Dockerfile
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - .:/backend
      - ./app/logs:/backend/app/logs
    # API NOT exposed to host — routed exclusively through Traefik
    ports:
      - "5678:5678"  # Debug port only
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SERVICE_ROLE=api
      - RUN_MIGRATIONS=true
    env_file:
      - ${ENV_FILE:-./.envs/.env.vps-staging}
    depends_on:
      - postgres
      - redis
      - minio
      - mailpit
    command: /start.sh
    networks:
      - vps_staging_nw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.rule=Host(`staging.litinkai.local`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.service=api-service"
      - "traefik.http.services.api-service.loadbalancer.server.port=8000"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.timeout=5s"

  mailpit:
    image: docker.io/axllent/mailpit:v1.20.3
    # Internal only — no host port exposure
    volumes:
      - vps_staging_mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - vps_staging_nw

  postgres:
    build:
      context: .
      dockerfile: ./docker/local/postgres/Dockerfile
    # Internal only — no host port exposure
    volumes:
      - vps_staging_db:/var/lib/postgresql/data
    env_file:
      - ${ENV_FILE:-./.envs/.env.vps-staging}
    networks:
      - vps_staging_nw

  redis:
    image: docker.io/redis:7.0-alpine
    command: redis-server --appendonly yes
    # Internal only — no host port exposure
    networks:
      - vps_staging_nw

  minio:
    image: minio/minio:latest
    # Internal only — no host port exposure
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - vps_staging_minio_data:/data
    networks:
      - vps_staging_nw

  celeryworker:
    <<: *api
    ports: []
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SERVICE_ROLE=celeryworker
      - RUN_MIGRATIONS=false
    command: /start-celeryworker.sh

  celerybeat:
    <<: *api
    ports: []
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SERVICE_ROLE=celerybeat
      - RUN_MIGRATIONS=false
    command: /start-celerybeat.sh

networks:
  vps_staging_nw:
    name: vps_staging_nw
    driver: bridge

volumes:
  vps_staging_db:
  vps_staging_mailpit_data:
  vps_staging_minio_data:
