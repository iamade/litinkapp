version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: litink-dev-postgres
    environment:
      POSTGRES_USER: litink
      POSTGRES_PASSWORD: litink_dev_2026
      POSTGRES_DB: litinkapp
    ports:
      - "5433:5432"
    volumes:
      - litink-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litink -d litinkapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: litink-dev-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - litink-dev-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: litink-dev-redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - litink-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litink-dev-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.envs/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: litink-dev-frontend
    ports:
      - "3001:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litink-dev-celery-worker
    command: ["sh", "-c", "celery -A app.tasks.celery_app worker -Q $${CELERY_TASK_DEFAULT_QUEUE:-litink_tasks} --loglevel=info --concurrency=2"]
    env_file:
      - ./backend/.envs/.env.local
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litink-dev-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - ./backend/.envs/.env.local
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

volumes:
  litink-dev-pgdata:
  litink-dev-minio-data:
  litink-dev-redis-data:
