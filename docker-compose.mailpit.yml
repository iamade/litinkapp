# KAN-264: optional local/staging Mailpit SMTP sink for activation-email QA.
# Usage: docker compose -f docker-compose.yml -f docker-compose.mailpit.yml up -d mailpit backend
# SMTP is available only inside the compose network at mailpit:1025.
# Web UI is bound privately to localhost for SSH tunnel/proxy access: 127.0.0.1:8025.

services:
  mailpit:
    image: axllent/mailpit:v1.24
    container_name: litink-mailpit
    restart: unless-stopped
    expose:
      - "1025"
    ports:
      - "127.0.0.1:8025:8025"
    environment:
      MP_SMTP_BIND_ADDR: "0.0.0.0:1025"
      MP_UI_BIND_ADDR: "0.0.0.0:8025"
      MP_DATABASE: "/data/mailpit.db"
    volumes:
      - litink-mailpit-data:/data

  backend:
    environment:
      MAIL_SERVICE: "mailpit"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      MAILPIT_UI_PORT: "8025"
    depends_on:
      mailpit:
        condition: service_started

  celery-worker:
    environment:
      MAIL_SERVICE: "mailpit"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      MAILPIT_UI_PORT: "8025"
    depends_on:
      mailpit:
        condition: service_started

  celery-beat:
    environment:
      MAIL_SERVICE: "mailpit"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      MAILPIT_UI_PORT: "8025"
    depends_on:
      mailpit:
        condition: service_started

volumes:
  litink-mailpit-data:
